<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Booking Dashboard</title>
  <!-- Load Supabase CDN Library -->
  <script src="https://jsdelivr.net"></script>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #1a0f0a; /* Match Luxury Palette */
      color: #f5f0eb;
    }
    .dashboard-container {
      max-width: 900px;
      margin: 0 auto;
      background-color: #2c1a11;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    h1 {
      color: #e6dfd5;
      margin-bottom: 24px;
      border-bottom: 1px solid #3d2519;
      padding-bottom: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #3d2519;
    }
    th {
      background-color: #120a06;
      color: #c4b5a9;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    tr:hover {
      background-color: #362115;
    }
    .cancel-btn {
      background-color: #8b2626;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .cancel-btn:hover {
      background-color: #b23b3b;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <h1>Appointments Schedule</h1>
    <table>
      <thead>
        <tr>
          <th>Client Name</th>
          <th>Date</th>
          <th>Time</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="appointmentRows">
        <tr>
          <td colspan="4" style="text-align: center; color: #9c8a7f;">Connecting to database...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    // Configured parameters matching your project
    const SUPABASE_URL = 'https://ibnbsffnqyrpqjhpbtjc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_194EeT0E7f1lJhtaU_2fXg_fkNFts3I';
    
    // Explicitly reference the global window scope to avoid crashes
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadAppointments() {
      const tableBody = document.getElementById('appointmentRows');
      
      try {
        const { data, error } = await supabaseClient
          .from('appointments')
          .select('*')
          .order('booking_date', { ascending: true });

        if (error) {
          tableBody.innerHTML = `<tr><td colspan="4" style="color: #ff6b6b; text-align: center;">Database Error: ${error.message}</td></tr>`;
          return;
        }

        if (!data || data.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #9c8a7f;">No active bookings found.</td></tr>`;
          return;
        }

        tableBody.innerHTML = ''; // Wipe loading message

        data.forEach(appointment => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${appointment.name || 'Anonymous'}</td>
            <td>${appointment.booking_date}</td>
            <td>${appointment.booking_time}</td>
            <td>
              <button class="cancel-btn" onclick="cancelAppointment('${appointment.id}')">Cancel</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
        
      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="4" style="color: #ff6b6b; text-align: center;">Connection Crash: ${err.message}</td></tr>`;
      }
    }

    async function cancelAppointment(id) {
      if (confirm('Are you sure you want to cancel this booking?')) {
        const { error } = await supabaseClient
          .from('appointments')
          .delete()
          .eq('id', id);

        if (error) {
          alert('Could not cancel: ' + error.message);
        } else {
          alert('Appointment cancelled successfully.');
          loadAppointments(); 
        }
      }
    }

    // Fire off the initialization check
    loadAppointments();
  </script>
</body>
</html>
